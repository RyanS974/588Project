# Industry Standards for Testability Metrics
#
# Standards based on industry research and best practices.
# Research-based values and industry standards are treated synonymously.
# All thresholds are derived from empirical studies and established practices.

- id: python-industry-standard
  language: python
  project_type: application
  standards:
    - metric_name: "test_to_code_ratio"
      threshold: 0.39  # Based on research showing 39% of codebase is test code on average
      description: "Test code should comprise approximately 39% of the total codebase (based on research of open-source .NET projects)"
    - metric_name: "assertion_density"
      threshold: 0.15  # Estimated from industry best practices for assertion usage
      description: "Minimum density of assertions per line of test code based on industry best practices"
    - metric_name: "edge_case_coverage"
      threshold: 0.60  # Estimated based on importance of edge case testing (90% of bugs from edge conditions)
      description: "Estimated coverage of critical edge cases based on systematic boundary value analysis practices"

- id: java-industry-standard
  language: java
  project_type: application
  standards:
    - metric_name: "test_to_code_ratio"
      threshold: 0.39  # Same as Python - based on research showing 39% of codebase is test code on average
      description: "Test code should comprise approximately 39% of the total codebase (based on research of open-source .NET projects)"
    - metric_name: "assertion_density"
      threshold: 0.20  # Slightly higher than Python based on Java's more verbose assertion methods
      description: "Minimum density of assertions per line of test code based on Java industry best practices"
    - metric_name: "edge_case_coverage"
      threshold: 0.60  # Estimated based on importance of edge case testing (90% of bugs from edge conditions)
      description: "Estimated coverage of critical edge cases based on systematic boundary value analysis practices"

# Sources:
# - Test-to-code ratio: Based on research from Codebetter showing average of 39% of codebase is test code
# - Assertion practices: Derived from IBM, Baeldung, Medium recommendations on assertion best practices
# - Edge case importance: Based on MoldStud research showing 90% of bugs arise from edge conditions